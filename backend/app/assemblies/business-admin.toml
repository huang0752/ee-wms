[assembly]
name = "business-admin"
title = "通用业务后台装配"
description = "保留常见业务后台能力：任务、通知、字典、文件、审计和代码生成。"

[core]
required = ["auth", "tenant", "user", "role", "permission", "menu", "settings", "audit"]

[backend]
enabled_plugins = ["module_task", "module_generator"]
disabled_plugins = ["module_example"]

[frontend]
enabled_route_groups = ["auth", "home", "dashboard", "system", "platform", "module-task", "module-generator", "user-profile", "payment", "workspace", "outside", "exception"]
disabled_route_groups = ["pricing", "article", "tutorial"]

[seed]
packs = ["business-admin"]

[features]
flags = { ai_assistant = false, plugin_market = true, tenant_package = true, demo_content = false, fast_enter = true }

[assembly]
name = "wms"
title = "EE WMS 装配"
description = "EE WMS 产品运行态装配：保留后台基础与行业样例能力，前台隐藏 AI、任务、代码生成、演示和营销入口。"

[core]
required = ["auth", "tenant", "user", "role", "permission", "menu", "settings", "audit"]

[backend]
enabled_plugins = ["module_ai", "module_task", "module_generator"]
disabled_plugins = ["module_example"]

[frontend]
enabled_route_groups = [
  "auth",
  "home",
  "system",
  "platform",
  "module-wms",
  "user-profile",
  "workspace",
  "outside",
  "exception"
]
disabled_route_groups = ["ai-chat", "dashboard", "module-task", "module-generator", "payment", "pricing", "article", "tutorial", "changelog"]

[menu]
disabled_paths = [
  "/platform/package",
  "/platform/order",
  "/platform/invoice",
  "/platform/plugin-market",
  "/system/notice",
  "/system/ticket"
]

[seed]
packs = ["wms"]

[features]
flags = { ai_assistant = false, plugin_market = false, tenant_billing = false, tenant_workspace_overview = false, tenant_usage_certificate = true, tenant_package = true, demo_content = false, fast_enter = true, wms_demo_data = true, system_config = true }
